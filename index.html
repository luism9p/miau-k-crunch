<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miau K-Crunch — Banderillas coreanas &amp; más</title>
<link rel="icon" href="assets/miau-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="miau-page">
  <div class="miau-app">

    <!-- HEADER -->
    <div class="miau-header">
      <img src="assets/miau-logo.png" alt="Miau K-Crunch" class="miau-header-logo">
      <div class="miau-header-title">
        <div class="miau-brand">MIAU K-CRUNCH</div>
        <div class="miau-tagline">Banderillas coreanas &amp; más</div>
      </div>
      <div id="miau-status" class="miau-status"></div>
    </div>

    <!-- CLOSED BANNER -->
    <div id="miau-closed-banner"></div>

    <!-- PROGRESS -->
    <div id="miau-progress"></div>

    <!-- BODY -->
    <div class="miau-scroll" id="miau-body"></div>

    <!-- FLOATING CART -->
    <div id="miau-cart"></div>

    <!-- BOTTOM NAV -->
    <div id="miau-nav"></div>

  </div>
</div>
<script src="app.js"></script>
</body>
</html>
